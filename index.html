      name="description"

    <meta name="color-scheme" content="light dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/style.css" />

    <!--
      Apply the saved (or preferred) theme before first paint to avoid a flash.
      The typed ThemeController takes over once dist/main.js loads; this keeps
      the storage key in sync with THEME_STORAGE_KEY in src/theme.ts.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("tc-theme");
          if (stored !== "light" && stored !== "dark") {
            stored =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.setAttribute("data-theme", stored);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#about">Skip to content</a>

    <!--
      Vercel Web Analytics. Vercel serves this script and its beacon endpoints
      from the same origin under /_vercel/insights/*, so the strict CSP allows
      it via script-src/connect-src 'self' with no change. It 404s harmlessly in
      local `serve`/e2e (the endpoint only exists on Vercel with Web Analytics
      enabled for the project).
    -->
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
