<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Title, description, canonical link, Open Graph/Twitter cards and the
      JSON-LD structured data below are all injected at build from
      siteConfig.seo (src/config.ts) — so this copy lives in exactly one place.
    -->
    <title>__SEO_TITLE__</title>
    <meta name="description" content="__SEO_DESCRIPTION__" />
    __SOCIAL_META__
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f2ec" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#181a1b" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!--
      Self-hosted fonts (styles/fonts.css) — no third-party origin, so the CSP
      stays same-origin (see vercel.json). Preload the two faces used above the
      fold to keep first paint fast without the old Google Fonts round-trip.
    -->
    <link rel="preload" href="/fonts/space-grotesk.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/style.css" />

    __JSON_LD__

    <!--
      Apply the saved (or preferred) theme before first paint to avoid a flash.
      The typed ThemeController takes over once dist/main.js loads. This inline
      script is the single source of the boot code (scripts/blog.mjs reuses it
      verbatim and vercel.json pins its hash), so it can't import a module — the
      "tc-theme" key below must equal THEME_STORAGE_KEY in src/theme.ts, which a
      unit test (tests/unit/csp.test.ts) now enforces so the two can't drift.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("tc-theme");
          if (stored !== "light" && stored !== "dark") {
            stored =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.setAttribute("data-theme", stored);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#about">Skip to content</a>
    <div id="app"></div>
    <noscript>
      <p class="noscript-note">
        This site renders its content with JavaScript. Please enable it, or find
        Charlie on
        <a href="https://github.com/Charlie-C-1266">GitHub</a>.
      </p>
    </noscript>
    <script type="module" src="dist/main.js"></script>
    <!--
      Vercel Web Analytics. Vercel serves this script and its beacon endpoints
      from the same origin under /_vercel/insights/*, so the strict CSP allows
      it via script-src/connect-src 'self' with no change. It 404s harmlessly in
      local `serve`/e2e (the endpoint only exists on Vercel with Web Analytics
      enabled for the project).
    -->
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
