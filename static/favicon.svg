<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="testingcharlie">
  <!-- Terminal prompt ">_" on the dark band colour — mirrors the site's
       charlie@testing:~$ shell motif. Colours track styles/tokens.css
       (--band #181a1b, --band-green #5cbf88). Drawn as vectors so the mark is
       font-independent and crisp at every size. -->
  <rect width="32" height="32" rx="7" fill="#181a1b"/>
  <path d="M10.5 10.5 L17 16 L10.5 21.5" fill="none" stroke="#5cbf88" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="18" y="19.4" width="7.5" height="2.8" rx="1.4" fill="#5cbf88"/>
</svg>
